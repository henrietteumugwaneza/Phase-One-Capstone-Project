<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for correct text rendering -->
    <meta charset="UTF-8">

    <!-- Responsive scaling for mobile and desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website title shown in browser tab -->
    <title>Book Explorer Pro</title>

    <!-- Tailwind CSS CDN for utility-first styling -->
    <script src="https://cdn.tailwindcss.com"></script>


    <!-- Custom Tailwind configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#111827',     // Main dark background color
                        darkcard: '#1f2937',   // Card background color
                        accent: '#d4af37',     // Gold accent color
                        softgray: '#374151'    // Soft gray for borders/text
                    }
                }
            }
        }
    </script>
</head>

    <body id="appBody" class="bg-darkbg text-white min-h-screen transition-colors duration-500">

    <!-- ================= NAVBAR ================= -->
   <nav class="w-full bg-darkcard shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
        
        <h1 class="text-xl font-bold text-accent">Book Explorer Pro</h1>

        <div class="flex items-center gap-6">

            <!-- LINKS -->
            <div class="space-x-6">
                <a href="index.html" class="hover:text-accent transition">Home</a>
                <a href="favorites.html" class="text-accent font-semibold">Favorites</a>
                <a href="about.html" class="hover:text-accent transition">About</a>
            </div>

            <!-- THEME ICONS -->
            <div class="flex items-center gap-4">

                <!-- MOON -->
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="size-6 cursor-pointer">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 
                    0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 
                    7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>

                <!-- SUN -->
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="size-6 cursor-pointer">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 
                    6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 
                    1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 
                    3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>

            </div>
        </div>
    </div>
</nav>

    <!-- ================= HERO SECTION ================= -->
    <section class="text-center py-20 px-4">
        
        <!-- Main heading -->
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">
            Discover Knowledge Through Books
        </h2>

        <!-- Subtitle -->
        <p class="text-softgray max-w-2xl mx-auto mb-6">
            Explore thousands of books, save your favorites, and build your personal digital library.
        </p>

        <!-- Search bar container -->
        <div class="flex justify-center gap-2">
            
            <!-- Input field for search -->
            <input 
                id="searchInput"
                type="text"
                placeholder="Search book title..."
                class="w-64 p-3 rounded-lg text-black outline-none"
            >

            <!-- Search button -->
            <button 
                id="searchBtn"
                class="bg-accent text-black px-6 py-3 rounded-lg font-semibold hover:opacity-80 transition"
            >
                Search
            </button>
        </div>
    </section>

    <!-- ================= BOOK GRID ================= -->
    <section class="max-w-7xl mx-auto px-6 pb-20">
        
        
        <!-- Grid container -->
       
        <div 
            id="bookGrid"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
        >
            <!-- Books will be injected here dynamically using JavaScript -->
        </div>

        <!-- Loading message -->
        <p id="loadingText" class="text-center mt-10 text-softgray">
            Loading books...
        </p>

    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-darkcard text-center p-6">
        <p class="text-softgray text-sm">
            © 2026 Book Explorer Pro | Built for professional growth
        </p>
    </footer>

    <!-- Main JavaScript file -->
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/theme.js"></script>


</body>
</html>
