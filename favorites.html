<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Favorites | Book Explorer Pro</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind custom theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#111827',
                        darkcard: '#1f2937',
                        accent: '#d4af37',
                        softgray: '#374151'
                    }
                }
            }
        }
    </script>
</head>

<body id="appBody" class="bg-darkbg text-white min-h-screen transition-colors duration-500">

    <!-- ================= NAVBAR ================= -->
    <nav class="w-full bg-darkcard shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-5">
        
        <h1 class="text-xl font-bold text-accent">Book Explorer Pro</h1>

        <div class="flex items-center gap-6">

            <!-- LINKS -->
            <div class="space-x-6">
                <a href="index.html" class="hover:text-accent transition">Home</a>
                <a href="favorites.html" class="text-accent font-semibold">Favorites</a>
                <a href="about.html" class="hover:text-accent transition">About</a>
            </div>

            <!-- THEME ICONS -->
            <div class="flex items-center gap-4">

                <!-- MOON -->
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="size-6 cursor-pointer">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 
                    0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 
                    7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>

                <!-- SUN -->
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="size-6 cursor-pointer">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 
                    6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 
                    1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 
                    3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>

            </div>
        </div>
    </div>
</nav>
    <!-- ================= HEADER ================= -->
    <section class="text-center py-16">
        <h2 class="text-4xl font-extrabold mb-3">Your Favorite Books</h2>
        <p class="text-softgray">Books you saved for later reading</p>
    </section>

    <!-- ================= FAVORITES GRID ================= -->
    <section class="max-w-7xl mx-auto px-6 pb-20">
        <div 
            id="favoritesGrid"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
        >
            <!-- Favorites will load here -->
        </div>

        <!-- Empty message -->
        <p id="emptyText" class="text-center text-softgray mt-10 hidden">
            No favorite books yet.
        </p>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-darkcard text-center p-6">
        <p class="text-softgray text-sm">
            © 2026 Book Explorer Pro | Favorites Library
        </p>
    </footer>

    <!-- Favorites page JS -->
    <script type="module" src="js/favorites-page.js"></script>
    <script type="module" src="js/theme.js"></script>
</body>
</html>
